name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  # Node.js 24 강제 사용 옵션 (경고 해결)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Android SO
            runs-on: ubuntu-latest
            artifact_name: libMod
            artifact_path: build/libMod.so

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}

    steps:
      # 액션 버전들을 최신(v4)으로 유지하여 Node.js 경고를 방지합니다.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK (Android)
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26b

      - name: Configure CMake (Android)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
